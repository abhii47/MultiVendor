# docker-compose.yml
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multivendor-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # IMPORTANT: inside Docker, use service name "mysql" (not localhost)
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: multivendor-mysql
    ports:
      - "3307:3306" # host:container (optional; remove if not needed externally)
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: multivendor_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data: