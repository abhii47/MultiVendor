# docker-compose.yml
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multivendor-app
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      # Use the host machine's database from inside the container.
      PORT: 3000
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/app              # 🔥 live code sync
      - /app/node_modules   # prevent overwrite

    command: npm run dev    # 🔥 run dev server (ts-node-dev)

    restart: unless-stopped